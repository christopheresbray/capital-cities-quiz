      width: 92%;

    .streak-info { font-size: 12px; color: #aaa; margin-bottom: 24px; min-height: 18px; }
    .question-label { color: #888; font-size: 14px; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 1.5px; }

    .mic-btn.listening { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse {

    .result-box { border-radius: 14px; padding: 18px 24px; margin: 16px 0; font-size: 18px; font-weight: 600; }

    .result-wrong { background: #fce4ec; color: #c62828; }
    .correct-answer { font-size: 15px; color: #555; margin-top: 8px; }
    .btn {

      font-size: 17px; font-weight: 600; cursor: pointer;
      transition: transform 0.15s ease;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-skip {
      background: none; border: none; color: #aaa; font-size: 14px;
      margin-top: 14px; cursor: pointer; text-decoration: underline; padding: 0;
    }
    .answer-box { background: #f0f4ff; border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; }
    .answer-text { margin: 0; font-size: 32px; font-weight: 700; color: #4a3f8a; }
    .emoji-big { font-size: 56px; margin-bottom: 8px; }
    .finish-title { margin: 0 0 8px; color: #1a1a2e; font-size: 28px; }
    .finish-subtitle { color: #555; font-size: 18px; margin: 0 0 24px; }
    .stats-row { display: flex; gap: 16px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-box { border-radius: 12px; padding: 12px 24px; }
    .stat-box-green { background: #e8f5e9; }
    .stat-box-red { background: #fce4ec; }
    .stat-box-orange { background: #fff3e0; }
    .stat-num { font-size: 28px; font-weight: 700; }
    .stat-num-green { color: #2e7d32; }
    .stat-num-red { color: #c62828; }
    .stat-num-orange { color: #e65100; }
    .stat-label { font-size: 13px; color: #555; }
    .trouble-section { text-align: left; margin-bottom: 24px; }
    .trouble-heading { font-size: 14px; font-weight: 600; color: #888; margin-bottom: 8px; }
    .trouble-list {
      background: #fafafa; border-radius: 12px; padding: 12px 16px;
      max-height: 200px; overflow-y: auto; font-size: 14px; color: #444; line-height: 1.8;
    }
    .trouble-row { display: flex; justify-content: space-between; }
    .mode-toggle { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
    .mode-btn {
      padding: 8px 18px; border-radius: 20px; border: 2px solid #ddd;
      background: white; font-size: 13px; font-weight: 600; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .mode-btn.active { border-color: #667eea; background: #f0f4ff; color: #667eea; }
    .speak-btn {
      background: none; border: 2px solid #ddd; border-radius: 10px;
      padding: 6px 16px; font-size: 16px; cursor: pointer;
      color: #667eea; margin-top: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    .speak-btn:hover { background: #f0f4ff; border-color: #667eea; }
    .hint { font-size: 12px; color: #aaa; margin-top: 10px; }
  </style>
</head>

    function normalize(s){return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]/gi,"").toLowerCase().trim().replace(/\s+/g," ")}

          ),
          troubleList.length>0&&e("div",{className:"trouble-section"},
            e("p",{className:"trouble-heading"},"Countries you found tricky:"),
            e("div",{className:"trouble-list"},troubleList.map(function(c){
              var entry=COUNTRIES.find(function(x){return x.country===c});
              return e("div",{key:c,className:"trouble-row"},
                e("span",null,c," \u2192 ",e("strong",null,entry?entry.capital:"")),
                e("span",null,mastered.has(c)?"\u2705":"\u274C")
              );
            }))
          ),
          e("button",{className:"btn btn-primary",onClick:handleRestart},"Play Again")
        );
      }

      // QUIZ SCREEN
      var streakCount=streaks[current.country]||0;
      var isTroubleNow=troubleCountries.has(current.country);
      var streakText="";
      if(isTroubleNow){
        var fires="";for(var i=0;i<streakCount;i++)fires+="\uD83D\uDD25";
        var circles="";for(var j=0;j<MASTERY_THRESHOLD-streakCount;j++)circles+="\u26AA";
        streakText="Streak: "+fires+circles+" ("+streakCount+"/"+MASTERY_THRESHOLD+" to master)";
      }

      return e("div",{className:"card"},
        // Mode toggle
        e("div",{className:"mode-toggle"},
          e("button",{className:"mode-btn"+(mode==="voice"?" active":""),disabled:!hasSpeechRecognition,
            onClick:function(){setMode("voice");window.speechSynthesis.cancel();setResult(null);setTranscript("");setAutoAsked(false)}
          },"\uD83C\uDF99\uFE0F Voice"),
          e("button",{className:"mode-btn"+(mode==="manual"?" active":""),
            onClick:function(){setMode("manual");window.speechSynthesis.cancel();setResult(null);setTranscript("")}
          },"\uD83D\uDC46 Manual")
        ),

        // Progress
        e("div",{className:"progress-row"},
          e("span",{className:"progress-label"},"Mastered: "+totalMastered+" / "+totalCountries),
          e("span",{className:"progress-label"},"\u2705 "+score.correct+"  \u274C "+score.incorrect)
        ),
        e("div",{className:"progress-track"},e("div",{className:"progress-fill",style:{width:(totalMastered/totalCountries*100)+"%"}})),
        e("div",{className:"streak-info"},streakText),

        // Question
        e("p",{className:"question-label"},"What is the capital of\u2026"),
        e("h1",{className:"country-name"},current.country),

        // VOICE MODE — listening
        mode==="voice"&&!result&&e("div",{className:"mic-area"},
          e("button",{className:"mic-btn"+(listening?" listening":""),onClick:startListening,disabled:listening},"\uD83C\uDF99\uFE0F"),
          e("p",{className:"mic-hint"},listening?"Listening...":speaking?"Speaking... (tap mic when ready)":"Tap the mic and say your answer"),
          transcript&&e("div",{className:"transcript"},'"'+transcript+'"')
        ),

        // VOICE MODE — result
        mode==="voice"&&result&&e("div",null,
          e("div",{className:"result-box "+(result.correct?"result-correct":"result-wrong")},
            result.correct?"\u2705 Correct!":"\u274C Not quite!",
            e("div",{className:"correct-answer"},
              result.correct?'You said: "'+result.spoken+'"':'You said: "'+result.spoken+'" \u2014 the answer is '+current.capital
            ),
            e("button",{className:"speak-btn",onClick:function(){speak(current.capital)},style:{marginTop:8}},"\uD83D\uDD0A Hear it")
          ),
          e("div",{style:{display:"flex",gap:10,justifyContent:"center",marginTop:16,flexWrap:"wrap"}},
            e("button",{className:"btn btn-primary",onClick:handleNextVoice},"Next Country \u2192"),
            !result.correct&&e("button",{className:"btn",style:{background:"#2e7d32",color:"white"},onClick:handleOverrideCorrect},"Actually I was right!"),
            result.correct&&e("button",{className:"btn",style:{background:"#c62828",color:"white"},onClick:function(){setResult({correct:false,spoken:result.spoken})}},"Actually I was wrong")
          ),
          e("button",{className:"btn-skip",onClick:function(){setResult(null);setTranscript("");startListening()}},"Try again")
        ),

        // MANUAL MODE — not revealed
        mode==="manual"&&!revealed&&e("div",null,
          e("button",{className:"btn btn-primary",onClick:function(){setRevealed(true)},
            style:{padding:"16px 48px",fontSize:18,borderRadius:14,boxShadow:"0 4px 15px rgba(102,126,234,0.4)"}},"Reveal Answer"),
          e("p",{className:"hint"},"or press Space"),
          e("button",{className:"btn-skip",onClick:function(){var nq=queue.slice();nq.push(current);setQueue(nq);setIndex(index+1)}},"Skip this one")
        ),

        // MANUAL MODE — revealed
        mode==="manual"&&revealed&&e("div",null,
          e("div",{className:"answer-box"},
            e("p",{className:"answer-text"},current.capital),
            e("button",{className:"speak-btn",onClick:function(){speak(current.capital)},title:"Hear pronunciation"},"\uD83D\uDD0A Hear it")
          ),
          e("p",{style:{color:"#666",fontSize:15,margin:"12px 0 16px"}},"Did you get it right?"),
          e("div",{style:{display:"flex",gap:12,justifyContent:"center"}},
            e("button",{className:"btn",style:{background:"#2e7d32",color:"white"},onClick:function(){processAnswer(true)}},"\u2713 Got it!"),
            e("button",{className:"btn",style:{background:"#c62828",color:"white"},onClick:function(){processAnswer(false)}},"\u2717 Nope")
          ),
          e("p",{className:"hint"},"Press 1 = got it, 3 = nope")
        ),

        // Skip in voice mode
        mode==="voice"&&!result&&!listening&&!speaking&&e("button",{className:"btn-skip",onClick:function(){
          var nq=queue.slice();nq.push(current);setQueue(nq);setIndex(index+1);setTranscript("");setAutoAsked(false);
        }},"Skip this one")
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
